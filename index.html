<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi Galaxia de Amor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Dancing Script', 'Segoe UI', cursive, sans-serif;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400&display=swap');
        
        #mensaje {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-family: 'Poppins', sans-serif;
            margin: 0 auto;
            width: fit-content;
            max-width: 80%;
            pointer-events: none;
            z-index: 100;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        
        #titulo {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 2rem;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 20px rgba(255,200,100,0.8);
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .instruccion {
            position: absolute;
            top: 90px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
            z-index: 100;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            #titulo { font-size: 1.5rem; top: 15px; }
            .instruccion { top: 70px; font-size: 0.7rem; }
            #mensaje { font-size: 0.9rem; bottom: 20px; padding: 10px 20px; }
        }
        
        .heart-cursor {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: floatHeart 1s ease-out forwards;
            z-index: 1000;
        }
        
        @keyframes floatHeart {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }
    </style>
</head>
<body>
    <div id="titulo">Mi Galaxia para ti, Pebua</div>
    <div class="instruccion">Para Nicoletta</div>
    <div id="mensaje">Toca una estrella</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      
        window.addEventListener('load', function() {
            iniciarGalaxia();
        });
        
        function iniciarGalaxia() {
            const mensajesDeAmor = [
                "Te amo mucho Pebua",
                "Te quiero mucho huevota",
                "Eres mi inspiración",
                "Eres mi safe place",
                "Me quiero casar contigo",
                "¿Juntitos y abrazaditos por siempre?",
                "Eres el sueño del que nunca quiero despertar",
                "Me encantas",
                "Tienes mi corazón en tus manos             ",              
                "Eres hermosa",
                "Me encantan tus ojos",
                "I love u",
                "Quiero despertar a tu lado cada dia de mi vida",
                "Quiero pasar el resto de mi vida contigo"
            ];
            
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020218);
            scene.fog = new THREE.FogExp2(0x020218, 0.0008);
            
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(12, 6, 15);
            camera.lookAt(0, 0, 0);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x020218, 1);
            document.body.appendChild(renderer.domElement);
            
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.8;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.zoomSpeed = 1.2;
            controls.rotateSpeed = 1.0;
            controls.target.set(0, 0, 0);
            
            const starGroup = new THREE.Group();
            const starCount = 3000;
            const stars = [];
            
            const colores = [
                new THREE.Color(0x1A0B2E),
                new THREE.Color(0x2E1A47),
                new THREE.Color(0x6A2E70),
                new THREE.Color(0x4B0082),
                new THREE.Color(0x8B00FF),
                new THREE.Color(0x00CED1),
                new THREE.Color(0xFF69B4)
            ];
            
            const brazos = 4;
            
            for (let i = 0; i < starCount; i++) {
                const size = 0.05 + Math.random() * 0.1;
                const geometry = new THREE.SphereGeometry(size, 8, 8);
                const color = colores[Math.floor(Math.random() * colores.length)];
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.4 + Math.random() * 0.6,
                    metalness: 0.3,
                    roughness: 0.4
                });
                
                const star = new THREE.Mesh(geometry, material);
                
                const brazo = i % brazos;
                const angleOffset = (brazo / brazos) * Math.PI * 2;
                const radius = Math.pow(Math.random(), 1.5) * 12;
                const angle = angleOffset + radius * 1.5 + Math.random() * 0.5;
                
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = Math.sin(radius * 2) * 0.8 * (Math.random() - 0.5);
                star.position.set(x, y, z);
                
                const mensajeIndex = Math.floor(Math.random() * mensajesDeAmor.length);
                star.userData = {
                    mensaje: mensajesDeAmor[mensajeIndex],
                    originalEmissive: 0.4 + Math.random() * 0.6
                };
                
                starGroup.add(star);
                stars.push(star);
            }
            
            scene.add(starGroup);
            
            const coreGeometry = new THREE.SphereGeometry(0.6, 32, 32);
            const coreMaterial = new THREE.MeshStandardMaterial({
                color: 0xffaa66,
                emissive: 0xff4422,
                emissiveIntensity: 1.5,
                metalness: 0.8,
                roughness: 0.2
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            scene.add(core);
            
            const centerLight = new THREE.PointLight(0xffaa66, 1, 20);
            centerLight.position.set(0, 0, 0);
            scene.add(centerLight);
            
            const ambientLight = new THREE.AmbientLight(0x111122);
            scene.add(ambientLight);
            
            const backLight = new THREE.DirectionalLight(0x8866ff, 0.5);
            backLight.position.set(2, 3, 4);
            scene.add(backLight);
            
            const dustCount = 8000;
            const dustGeometry = new THREE.BufferGeometry();
            const dustPositions = new Float32Array(dustCount * 3);
            for (let i = 0; i < dustCount; i++) {
                const radius = 8 + Math.random() * 10;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                dustPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
                dustPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.3;
                dustPositions[i*3+2] = radius * Math.cos(phi);
            }
            dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
            const dustMaterial = new THREE.PointsMaterial({
                color: 0xffaacc,
                size: 0.03,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            const dustParticles = new THREE.Points(dustGeometry, dustMaterial);
            scene.add(dustParticles);
            
            const bgStarCount = 3000;
            const bgGeometry = new THREE.BufferGeometry();
            const bgPositions = new Float32Array(bgStarCount * 3);
            for (let i = 0; i < bgStarCount; i++) {
                bgPositions[i*3] = (Math.random() - 0.5) * 200;
                bgPositions[i*3+1] = (Math.random() - 0.5) * 100;
                bgPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
            }
            bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
            const bgMaterial = new THREE.PointsMaterial({
                color: 0x88aaff,
                size: 0.08,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            const bgStars = new THREE.Points(bgGeometry, bgMaterial);
            scene.add(bgStars);
            
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const mensajeDiv = document.getElementById('mensaje');
            
            function crearCorazon(x, y) {
                const heart = document.createElement('div');
                heart.className = 'heart-cursor';
                heart.innerHTML = '❤';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
            
            window.addEventListener('click', (event) => {
                mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
                mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(stars);
                
                if (intersects.length > 0) {
                    const clickedStar = intersects[0].object;
                    const mensaje = clickedStar.userData.mensaje;
                    
                    mensajeDiv.style.transform = 'scale(1.05)';
                    mensajeDiv.innerHTML = '♥ ' + mensaje + ' ♥';
                    setTimeout(() => {
                        mensajeDiv.style.transform = 'scale(1)';
                    }, 200);
                    
                    crearCorazon(event.clientX, event.clientY);
                    
                    const originalIntensity = clickedStar.material.emissiveIntensity;
                    clickedStar.material.emissiveIntensity = 1.5;
                    clickedStar.scale.set(1.8, 1.8, 1.8);
                    setTimeout(() => {
                        clickedStar.material.emissiveIntensity = originalIntensity;
                        clickedStar.scale.set(1, 1, 1);
                    }, 300);
                    
                    setTimeout(() => {
                        if (mensajeDiv.innerHTML.includes(mensaje)) {
                            mensajeDiv.innerHTML = 'Toca otra estrella para otro mensaje';
                        }
                    }, 4000);
                }
            });
            
            renderer.domElement.style.cursor = 'pointer';
            
            let time = 0;
            
            const ringGeometry = new THREE.TorusGeometry(2.5, 0.05, 64, 300);
            const ringMaterial = new THREE.MeshStandardMaterial({
                color: 0xff88aa,
                emissive: 0xff4488,
                emissiveIntensity: 0.5
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            
            const ring2Geometry = new THREE.TorusGeometry(3.8, 0.03, 64, 300);
            const ring2Material = new THREE.MeshStandardMaterial({
                color: 0xaaffdd,
                emissive: 0x44aaff,
                emissiveIntensity: 0.3
            });
            const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
            ring2.rotation.x = Math.PI / 2 + 0.3;
            scene.add(ring2);
            
            function animate() {
                time += 0.016;
                
                const pulse = 0.8 + Math.sin(time * 3) * 0.2;
                core.scale.set(pulse, pulse, pulse);
                centerLight.intensity = 0.8 + Math.sin(time * 4) * 0.5;
                
                starGroup.rotation.y += 0.002;
                dustParticles.rotation.y += 0.0005;
                dustParticles.rotation.x = Math.sin(time * 0.1) * 0.1;
                
                ring.rotation.z += 0.01;
                ring2.rotation.x += 0.005;
                ring2.rotation.z += 0.008;
                
                bgStars.rotation.y += 0.0002;
                
                controls.update();
                renderer.render(scene, camera);
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            setInterval(() => {
                const randomMsg = mensajesDeAmor[Math.floor(Math.random() * mensajesDeAmor.length)];
                mensajeDiv.innerHTML = randomMsg;
                setTimeout(() => {
                    if (mensajeDiv.innerHTML === randomMsg) {
                        mensajeDiv.innerHTML = 'Toca una estrella para otro mensaje';
                    }
                }, 5000);
            }, 30000);
        }
    </script>
</body>
</html>
